namespace: datapipe-prod

replicaCount: 1

imagePullSecrets:
  - name: datapipe-registry-secret

registry: docker.io
repository: datapipe

master:
  enabled: true
  replicaCount: 3
  image:
    repository: datapipe-master
    tag: stable
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9090
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 2

worker:
  enabled: true
  replicaCount: 5
  image:
    repository: datapipe-worker
    tag: stable
    pullPolicy: Always
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  daemonset:
    enabled: false

database:
  enabled: false
  host: postgresql.prod.svc.cluster.local
  port: 5432
  name: datapipe
  user: datapipe
  password: ""
  sslmode: require
  maxOpenConns: 50
  maxIdleConns: 10
  connMaxLifetime: 3600

redis:
  enabled: false
  host: redis.prod.svc.cluster.local
  port: 6379
  password: ""
  db: 0

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-write-timeout: "300"
  hosts:
    - host: datapipe.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: datapipe-prod-tls
      hosts:
        - datapipe.io

monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
  grafana:
    enabled: true
    port: 3000

serviceMonitor:
  enabled: true
  interval: 15s

config:
  logLevel: warn
  workerConcurrency: 20
  maxRetryAttempts: 5
  pipelineBufferSize: 500
