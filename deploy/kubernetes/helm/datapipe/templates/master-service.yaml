{{- if and .Values.master.enabled .Values.master.service }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datapipe.master.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "datapipe.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
  {{- with .Values.master.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.master.service.type }}
  ports:
    - port: {{ .Values.master.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.monitoring.enabled }}
    - port: {{ .Values.master.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "datapipe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: master
{{- end }}
