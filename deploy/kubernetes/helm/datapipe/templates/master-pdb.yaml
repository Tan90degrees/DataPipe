{{- if and .Values.master.enabled .Values.master.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "datapipe.master.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "datapipe.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
spec:
  {{- if .Values.master.pdb.minAvailable }}
  minAvailable: {{ .Values.master.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.master.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.master.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "datapipe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: master
{{- end }}
