global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'datapipe-master'
    static_configs:
      - targets: ['master:9090']
    metrics_path: /metrics

  - job_name: 'datapipe-worker'
    static_configs:
      - targets: ['worker:9090']
    metrics_path: /metrics
